name: daily-macro-brief

on:
  schedule:
    # 北京时间每天 07:00 = UTC 23:00(前一日)。定时任务只在默认分支生效。
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# 防止 cron 偶发双触发 / 手动重跑与定时任务并发推送。
concurrency:
  group: daily-macro-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # rebase 重试需要分支历史

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # 纯 Python 管线:拉数(FRED/TwelveData/Tiingo,Yahoo 兜底)→ 特征 → LLM 四层简报
      # → 存 md + briefs.json + (有 webhook 则)推飞书。密钥缺失时自动降级,不让 CI 失败。
      - name: Generate brief
        env:
          # 数据源
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TIINGO_API_TOKEN: ${{ secrets.TIINGO_API_TOKEN }}
          # LLM provider(任配一个即可;都没配则只产出数据/特征层,不报错)
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          # 交付(可选)
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: PYTHONPATH=py python -m newsletter

      - name: Commit outputs
        if: always() # 即便简报步骤部分失败,也提交已产出的数据/报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无新数据,跳过提交"
            exit 0
          fi
          git commit -m "data: 宏观简报 $(date -u +%Y-%m-%d)"
          # 若默认分支在运行期间前进,rebase 后重试,避免 non-fast-forward 丢数据。
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push 失败,rebase 后重试 ($i/3)…"
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          echo "push 连续失败" >&2
          exit 1
