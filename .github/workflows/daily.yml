name: daily-macro-snapshot

on:
  schedule:
    # 北京时间每天 07:00 = UTC 23:00(前一日)。定时任务只在默认分支生效。
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# 防止 cron 偶发双触发 / 手动重跑与定时任务并发推送。
concurrency:
  group: daily-macro-snapshot
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # rebase 重试需要分支历史

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Fetch macro data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: cargo run --release --bin fetch

      # M1 智能平面:读数据→(有 key 则)生成四层简报→存 md + (有 webhook 则)推飞书。
      # ubuntu 自带 python3;纯 stdlib 无需安装。密钥缺失时自动降级,不让 CI 失败。
      - name: Generate brief (Python)
        env:
          # LLM provider(任配一个即可;都没配则只产出事实层,不报错)
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          # 交付(可选)
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: PYTHONPATH=py python3 -m newsletter.brief

      - name: Commit snapshot
        if: always() # 即便简报步骤失败,也提交已抓取的数据快照,不丢 M0 数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无新数据,跳过提交"
            exit 0
          fi
          git commit -m "data: 宏观快照 $(date -u +%Y-%m-%d)"
          # 若默认分支在运行期间前进,rebase 后重试,避免 non-fast-forward 丢数据。
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push 失败,rebase 后重试 ($i/3)…"
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          echo "push 连续失败" >&2
          exit 1
